name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Ruff lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install ruff
        run: uv tool install "ruff>=0.6"

      - name: Ruff lint
        run: uv tool run ruff check .

      - name: Ruff format (check)
        run: uv tool run ruff format --check .

  build:
    name: Build + import smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # pyproject.toml pins torch to the CPU-only index for Linux; no extra env needed.
      - name: Sync dependencies (with dev extra)
        run: uv sync --extra dev

      # Imports the full package via the CLI entry point — fails fast on any
      # ImportError without needing the corpus, Chroma index, or Ollama.
      - name: Smoke import (CLI --help)
        run: uv run student-bot-cli --help

      - name: Build sdist + wheel
        run: uv build
