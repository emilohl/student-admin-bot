version: 2

updates:
  # Python dependencies declared in pyproject.toml.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-minor-and-patch:
        update-types: ["minor", "patch"]

  # Workflow action versions (actions/checkout, astral-sh/setup-uv, ...).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Base image in Dockerfile (python:3.11-slim).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
