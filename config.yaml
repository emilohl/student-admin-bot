# Central configuration. Secrets live in .env (see .env.example).

paths:
  docs_dir: docs/corpus           # symlink to whereever your knowledge base files are
  chroma_dir: data/chroma
  logs_db: data/logs.sqlite

ingest:
  # PDFs that pymupdf4llm parses badly (tables) — falls back to docling.
  # Add filenames here after running scripts/inspect_pdf.py.
  docling_files: []
  chunk:
    # bge-m3 supports up to 8192 tokens; we don't need to be that aggressive.
    # ~600 tokens gives larger semantic units for retrieval while staying
    # cheap to embed and well below the LLM context budget.
    target_tokens: 600
    overlap_tokens: 80
  dedup_cosine_threshold: 0.97   # near-duplicate filter for SV/EN curriculum chunk pairs

embedding:
  # bge-m3 has substantially stronger cross-lingual retrieval than e5-base,
  # which matters here because English queries must hit Swedish policy docs.
  # ~2.3 GB resident — keeps the bot under ~4 GB total even with the reranker.
  # bge-m3 does NOT use the e5 query/passage prefixes, so leave those empty.
  model: BAAI/bge-m3
  device: cpu
  query_prefix: ""
  passage_prefix: ""

reranker:
  model: cross-encoder/mmarco-mMiniLMv2-L12-H384-v1
  device: cpu
  candidates: 20                 # top-N from Chroma to feed reranker
  keep: 8                        # top-K after rerank

gate:
  # Tuned via `python -m eval.run_eval` against eval/eval_set.yml. The
  # multilingual cross-encoder produces unbounded logits — these are scaled
  # to the actual score distribution, not 0–1. Re-tune whenever you change
  # the embedding or reranker model.
  rerank_top1_min: -0.5
  rerank_meanK_min: -1.0
  meanK: 3
  # The curriculum series (Utbildningsplan CTFYS HT2020…HT2026, sv+en) easily
  # spans 5+ distinct rel_sources for the same topic; with reranker.keep=8
  # the top-K naturally pulls in more distinct chunks before the dedup at
  # citation time. Relax accordingly.
  max_distinct_sources_in_topk: 8

llm:
  # Master selector. Identifier is `<provider_key>/<model_id>`, split on the
  # FIRST slash — Ollama tags use `:` and Berget/HF model IDs use additional
  # `/`, so first-slash splitting handles both. Switch models by changing
  # this one field, or override via `LLM_ACTIVE` in `.env`.
  active: ollama/gemma-4-E4B-it-GGUF:UD-Q4_K_XL

  # Backends. Each entry declares how to reach a hosting service. Multiple
  # models can share one provider — Berget hosts dozens of models behind
  # one base_url and one API key. `api_key_env` is the env var the loader
  # reads to populate `cfg.llm_api_keys[provider_key]` (SecretStr, kept out
  # of repr/dump). Set OLLAMA_URL to override the local Ollama base_url.
  providers:
    ollama:
      kind: ollama
      base_url: http://127.0.0.1:11434
    berget:
      kind: openai_compatible
      base_url: https://api.berget.ai/v1
      display_name: Berget AI
      api_key_env: BERGET_API_KEY
      timeout_seconds: 120
    openrouter:
      kind: openai_compatible
      base_url: https://openrouter.ai/api/v1
      display_name: OpenRouter
      api_key_env: OPENROUTER_API_KEY
      timeout_seconds: 120

  # Per-model knobs. Content (system prompt, citation rules, refusal text,
  # jargon expansion) stays shared across models in `prompts.py` so A/B
  # comparisons measure the model, not the prompt. Only technical
  # parameters and reasoning-channel handling vary here.
  #
  # `thinking_style` options:
  #   - "gemma"                  — Gemma 4 `<|channel>thought\n...<channel|>` block
  #                                + ollama API `thinking` field. Requires
  #                                `thinking: true` to actually fire.
  #   - "openai_reasoning_field" — DeepSeek-R1 / Qwen-style `delta.reasoning_content`.
  #   - "none"                   — model has no reasoning channel.
  models:
    "ollama/gemma-4-E4B-it-GGUF:UD-Q4_K_XL":
      # Q4_K_XL fits ~5–6 GB on Metal; the default gemma4:e4b tag is Q4_K_M (~9.6 GB).
      num_ctx: 16384
      temperature: 0.2
      max_tokens: 4096               # with thinking on, reasoning eats into this — leave headroom
      thinking: true
      thinking_style: gemma
    "berget/meta-llama/Llama-3.3-70B-Instruct":
      num_ctx: 128000
      temperature: 0.1
      max_tokens: 4096
      thinking: false
      thinking_style: none
    # Berget's largest dense Gemma — confirm the exact model id against
    # https://berget.ai/models (their console lists the API string). Same
    # `thinking_style: gemma` as the local Ollama variant: `<|think|>` is
    # prepended to the system prompt and `<|channel>thought\n...<channel|>`
    # blocks are stripped from the streamed content by the shared filter
    # in `bot/llm.py`. Works identically over Berget's OpenAI-compatible
    # endpoint as it does via local Ollama.
    "berget/google/gemma-3-27b-it":
      num_ctx: 65536
      temperature: 0.2
      max_tokens: 4096
      thinking: true
      thinking_style: gemma

memory:
  # Raised from 4 to 8 (#47) — the 16384-token context budget has plenty of
  # headroom and the previous cap was hitting compound conversations
  # (master-eligibility threads, multi-turn programme clarifications)
  # quickly enough that the silent truncation was visible to users. The
  # `chat.history_truncated` notice still fires when this cap is reached,
  # so users learn that the LLM has stopped seeing turn 1.
  max_turns: 8                   # last N user/assistant pairs per (user, thread)
  ttl_minutes: 30

mattermost:
  trigger_mention: "@ohm-bot"   # used in channel posts; DM always triggers
  reply_in_thread: true
  reconnect_max_seconds: 60
  # Render answers as Slack-style message attachments (colored sidebar +
  # Sources fields). Off by default; enable after eyeballing in your MM.
  use_attachments: false

logging:
  retain_days: 90

# How the bot refers students to a human when it can't (or shouldn't) answer.
fallback:
  counselor_label_sv: "studievägledaren"
  counselor_label_en: "the study counselor"
  # Optional: a URL or Mattermost handle. Leave blank to omit.
  counselor_link: ""

# Guardrails against prompt injection, spam, and fluency-as-confidence misreads.
guardrails:
  input_max_chars: 1000        # prompt-injection vectors are usually long
  rate_limit_per_minute: 5     # per-user; applies to MM and web
  show_confidence_badge: true  # pedagogical: makes "fluency ≠ correctness" visible

# Web testing UI. Bound to localhost by default; set WEB_BIND_HOST=0.0.0.0
# (and WEB_AUTH_ENABLED=true) to expose externally.
web:
  bind_host: 127.0.0.1
  port: 8000
  # Where the corpus is served from. Citations link to <doc_base_url>/<rel_source>.
  # Empty string = no clickable links.
  doc_base_url: /docs
  # Curated `.md` files (anything under docs/corpus/ that is NOT in
  # web_import/) are routed through this viewer instead of the raw static
  # mount, so they render as styled HTML with optional YAML-frontmatter
  # attribution. Empty string = serve raw markdown via doc_base_url.
  md_render_base_url: /doc
  require_name: true
  auth_enabled: false
  users_file: data/web_users   # passwd-like: "user:scrypt:<salt_b64>:<hash_b64>"
  session_idle_minutes: 60
  performance_panel_enabled: true

# Topic classification (analytics only — runs after the answer is sent).
topics:
  enabled: true
  file: topics.yaml
  classifier_temperature: 0.0

# Student-jargon dictionary. Expansions happen at query time so retrieval
# matches the formal term in the corpus. Edit `data/dictionary.json` (or accept
# proposals via `student-bot-jargon accept N`) — changes are picked up on the
# next query without a restart.
jargon:
  enabled: true
  file: data/dictionary.json
  proposals_file: data/dictionary_proposals.json
  show_transparency_note: true   # adds "_Tolkar X som Y._" above the answer
  max_glossary_entries: 6

# Dynamic KTH web retrieval for tightly allowlisted student pages.
dynamic_web:
  enabled: true
  timeout_seconds: 6.0
  max_pages_per_query: 12
  cache_ttl_days: 7
  # Matched against URL path only (host is hardcoded to www.kth.se).
  allowed_patterns:
    - "^/student/kurser/kurs/[A-Z0-9]+/?$"
    - "^/student/kurser/program/[A-Z0-9]+(?:/[0-9]{5}(?:/(?:arskurs[0-9]+|mal|omfattning|behorighet|genomforande|kurslista|inriktningar))?)?/?$"
  user_agent: "student-bot/0.1 (+https://github.com/cohm/student-admin-bot)"
  max_bytes: 1500000
  max_links_followed: 24
  cache_db: data/web_cache.sqlite
  program_aliases_file: data/program_aliases.json
  program_aliases_ttl_hours: 48
  program_aliases: {}

# URL/PDF corpus ingestion from a manifest.
url_ingest:
  enabled: yes
  domains_ingest_allowlist:
    - www.kth.se
    - kth.se
  timeout_seconds: 8.0
  max_bytes: 2000000
  max_pages_per_seed: 12
  default_max_depth: 1
  manifest_file: data/url_manifest_KTH.yaml
  output_dir: docs/corpus/web_import
  source_map_file: data/url_source_map.json
  include_vetted_links_in_markdown: true
  max_links_per_doc: 100
  domains_related_links_allowlist:
    - www.antagning.se
    - www.student.ladok.se
  domain_global_link_blocklist:
    - canvas.kth.se
  global_link_blocklist_url_patterns: []
  filtered_links_report_file: data/url_filtered_links_report.json
