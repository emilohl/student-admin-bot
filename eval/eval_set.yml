# Evaluation set for retrieval and gate calibration.
#
# Each entry:
#   question:                the user's query
#   lang:                    "sv" | "en"
#   kind:                    "in_domain" | "out_of_domain"
#   expected_doc_substring:  case-insensitive substring of the rel_source path
#                            of *any* document that should appear in retrieval
#                            top-K. Use a stem that doesn't accidentally match
#                            unrelated files. Multiple acceptable matches go in
#                            `expected_any` (list of substrings).
#   notes:                   optional rationale
#
# When you add new entries, prefer real questions students ask. Run
# `python -m eval.run_eval` and tune the gate thresholds in config.yaml.

