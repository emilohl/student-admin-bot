<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>student-bot</title>
<link rel="stylesheet" href="static/style.css?v=30">
</head>
<body>
<header>
  <div class="brand">
    <img src="static/KTH_logo_RGB_bla.svg" alt="KTH" class="logo logo-kth">
    <a class="brand-link" href="./">
      <div class="brand-text">
        <h1 data-i18n="brand.name"></h1>
        <p class="tagline" data-i18n="header.tagline"></p>
      </div>
    </a>
    <img src="static/FrakturF2020.svg" alt="Fysiksektionen" class="logo logo-fyssek">
  </div>
  <div class="lang-switch" role="group" aria-label="Language">
    <button type="button" data-lang="sv">SV</button>
    <button type="button" data-lang="en">EN</button>
  </div>
</header>

<main>
  <div class="notice" role="note">
    <div class="notice-body">
      <p><strong data-i18n="notice.title"></strong><span data-i18n="notice.body"></span></p>
    </div>
    <button class="notice-close" type="button" data-i18n-aria="notice.close.aria">×</button>
  </div>

  <section id="onboarding" class="card">
    <h2 data-i18n="onboarding.title"></h2>
    <p data-i18n="onboarding.intro"></p>
    <p class="caveat" data-i18n="onboarding.caveat"></p>
    <label data-i18n="onboarding.name.label"></label>
    <input id="name" type="text" data-i18n-placeholder="onboarding.name.placeholder" autocomplete="off">
    <label class="opt-out">
      <input id="opt-out" type="checkbox">
      <span data-i18n="onboarding.optout"></span>
    </label>
    <button id="start" data-i18n="onboarding.start"></button>
  </section>

  <section id="chat" class="card hidden">
    <div id="messages" aria-live="polite"></div>
    <form id="composer">
      <textarea id="question" rows="3" data-i18n-placeholder="chat.placeholder" required></textarea>
      <div class="composer-row">
        <div id="perf-panel" class="perf-panel hidden" aria-live="polite">
          <div class="perf-line">
            <span class="perf-label" data-i18n="perf.context" data-i18n-title="perf.tip.context"></span>
            <span id="perf-context" class="perf-value">–</span>
          </div>
          <div class="perf-line">
            <span class="perf-label" data-i18n="perf.tokens" data-i18n-title="perf.tip.tokens"></span>
            <span id="perf-tokens" class="perf-value">–</span>
          </div>
          <div class="perf-line">
            <span class="perf-label" data-i18n="perf.system" data-i18n-title="perf.tip.system"></span>
            <span id="perf-system" class="perf-value">–</span>
          </div>
          <span id="status" class="status"></span>
        </div>
        <div class="composer-actions-col">
          <div class="composer-actions">
            <button type="button" id="export" class="ghost" hidden
                    data-i18n="chat.export" data-i18n-title="chat.export.title"></button>
            <button type="button" id="reset" class="ghost" data-i18n="chat.reset"></button>
            <button type="submit" id="send" data-i18n="chat.send"></button>
          </div>
          <div class="chat-status" role="status" aria-live="polite">
            <span class="logging-dot" id="logging-dot"></span>
            <span class="logging-label" id="logging-label"></span>
            <button type="button" id="logging-toggle" class="link"></button>
          </div>
        </div>
      </div>
    </form>
  </section>
</main>

<footer>
  <a href="about" data-i18n="footer.about"></a> ·
  <a href="glossary" data-i18n="footer.glossary"></a> ·
  <a href="stats" data-i18n="footer.stats"></a> ·
  <span id="conn"></span>
</footer>

<script src="static/i18n.js?v=30"></script>
<script src="static/notice.js?v=30" defer></script>
<script src="static/app.js?v=30"></script>
</body>
</html>
